<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Story Editor</title>
<link href="https://fonts.googleapis.com/css2?family=Raleway:wght@300;400;600;700&family=Oswald:wght@400;700&family=Bebas+Neue&family=Special+Elite&family=Playfair+Display:ital,wght@0,700;1,700&family=Bangers&family=Cormorant+Garamond:ital,wght@0,400;1,400;1,700&family=DM+Sans:wght@300;400;500&family=Poppins:wght@300;400;500;600;700&family=Anton&family=Fredoka:wght@400;600;700&family=Cinzel:wght@400;700&family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0e0e0e;
  --surface: #181818;
  --surface2: #222;
  --border: #2e2e2e;
  --border2: #3a3a3a;
  --text: #f0f0f0;
  --text2: rgba(255,255,255,0.45);
  --text3: rgba(255,255,255,0.25);
  --accent: #fff;
  --panel: 280px;
}

html, body { height:100%; overflow:hidden; background:var(--bg); color:var(--text); font-family:'Inter',sans-serif; }

/* ── LAYOUT ── */
.app { display:flex; height:100vh; width:100vw; }

/* LEFT PANEL */
.panel-left {
  width: var(--panel);
  min-width: var(--panel);
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.panel-logo {
  padding: 16px 18px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
}
.panel-logo svg { flex-shrink:0; }
.panel-logo-text { font-size:13px; font-weight:700; color:var(--text); letter-spacing:-0.2px; }
.panel-logo-sub { font-size:10px; color:var(--text3); }

.panel-tabs {
  display: flex;
  border-bottom: 1px solid var(--border);
}
.ptab {
  flex:1; padding:9px 4px; text-align:center; font-size:10px; font-weight:600;
  letter-spacing:0.5px; text-transform:uppercase; color:var(--text3);
  cursor:pointer; border-bottom:2px solid transparent; transition:all .15s;
}
.ptab.active { color:var(--text); border-bottom-color:var(--text); }

.panel-body { flex:1; overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:16px; }
.panel-body::-webkit-scrollbar { width:4px; }
.panel-body::-webkit-scrollbar-thumb { background:#333; border-radius:2px; }

/* SECTIONS */
.section-label {
  font-size:9px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
  color:var(--text3); margin-bottom:6px;
}

/* PHOTO UPLOAD */
.upload-zone {
  background: var(--surface2);
  border: 1.5px dashed var(--border2);
  border-radius:8px; padding:18px 12px;
  text-align:center; cursor:pointer; transition:border-color .15s;
  display:flex; flex-direction:column; align-items:center; gap:6px;
}
.upload-zone:hover { border-color:#555; }
.upload-zone span { font-size:11px; color:var(--text3); }
.upload-zone strong { font-size:12px; color:var(--text2); }
#fileInput { display:none; }

/* ELEMENTS LIST */
.el-list { display:flex; flex-direction:column; gap:4px; }
.el-item {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:6px; padding:8px 10px;
  display:flex; align-items:center; gap:8px;
  cursor:pointer; transition:all .15s; user-select:none;
}
.el-item:hover { border-color:#444; }
.el-item.selected { border-color:rgba(255,255,255,0.4); background:#282828; }
.el-item-icon { font-size:14px; flex-shrink:0; }
.el-item-info { flex:1; min-width:0; }
.el-item-name { font-size:11px; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.el-item-sub { font-size:9px; color:var(--text3); }
.el-item-del { font-size:12px; color:var(--text3); cursor:pointer; padding:2px 4px; border-radius:3px; }
.el-item-del:hover { color:#ff5555; background:rgba(255,85,85,.1); }

.btn-add-el {
  background:transparent; border:1px dashed var(--border2); border-radius:6px;
  padding:9px; width:100%; cursor:pointer; color:var(--text3); font-size:11px;
  font-family:'Inter',sans-serif; font-weight:600; transition:all .15s;
  display:flex; align-items:center; justify-content:center; gap:6px;
}
.btn-add-el:hover { border-color:#555; color:var(--text2); }

/* PROPERTIES PANEL */
.prop-section { display:flex; flex-direction:column; gap:8px; }
.prop-empty { text-align:center; padding:24px 12px; color:var(--text3); font-size:11px; line-height:1.6; }

.prop-row { display:flex; align-items:center; gap:8px; }
.prop-row label { font-size:10px; color:var(--text3); min-width:52px; flex-shrink:0; }
.prop-row.col { flex-direction:column; align-items:stretch; }
.prop-row.col label { margin-bottom:2px; }

.input-text, .input-select, .input-range {
  background:var(--surface2); border:1px solid var(--border2); border-radius:5px;
  color:var(--text); font-family:'Inter',sans-serif; font-size:12px; padding:6px 8px;
  outline:none; transition:border-color .15s; width:100%;
}
.input-text:focus, .input-select:focus { border-color:#555; }
.input-select option { background:#222; }
.input-range { padding:4px 0; background:transparent; border:none; cursor:pointer; }
.input-range::-webkit-slider-track { background:var(--border2); border-radius:2px; height:3px; }
.input-range::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:#fff; margin-top:-4px; }

.input-short { width:64px; flex-shrink:0; }
.two-col { display:grid; grid-template-columns:1fr 1fr; gap:6px; }
.three-col { display:grid; grid-template-columns:1fr 1fr 1fr; gap:5px; }

/* Color swatch */
.color-row { display:flex; align-items:center; gap:6px; }
.color-preview {
  width:26px; height:26px; border-radius:5px; border:1px solid var(--border2);
  cursor:pointer; flex-shrink:0; position:relative; overflow:hidden;
}
.color-input-hidden { position:absolute; inset:0; opacity:0; cursor:pointer; width:100%; height:100%; }

/* Background controls */
.bg-swatch-row { display:flex; gap:6px; flex-wrap:wrap; }
.bg-swatch {
  width:28px; height:28px; border-radius:5px; cursor:pointer;
  border:2px solid transparent; transition:border-color .15s; flex-shrink:0;
}
.bg-swatch:hover, .bg-swatch.active { border-color:#fff; }

/* Alignment buttons */
.align-btns { display:flex; gap:4px; }
.align-btn {
  background:var(--surface2); border:1px solid var(--border2); border-radius:4px;
  padding:5px 7px; cursor:pointer; color:var(--text2); font-size:11px; transition:all .15s;
}
.align-btn:hover, .align-btn.active { background:#333; color:var(--text); border-color:#555; }

/* Opacity + bg-opacity */
.range-with-val { display:flex; align-items:center; gap:6px; }
.range-val { font-size:10px; color:var(--text3); min-width:26px; text-align:right; }

/* Divider */
.divider { height:1px; background:var(--border); margin:4px 0; }

/* ── CENTER CANVAS ── */
.canvas-area {
  flex:1; display:flex; align-items:center; justify-content:center;
  background: #0a0a0a;
  background-image: radial-gradient(circle at 50% 50%, #161616 0%, #0a0a0a 100%);
  position:relative; overflow:hidden;
}

/* Story frame */
#storyFrame {
  width:360px; height:640px;
  position:relative; overflow:hidden;
  border-radius:16px;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 32px 80px rgba(0,0,0,0.8);
  background:#111;
  user-select:none;
  cursor:default;
}

#storyBg {
  position:absolute; inset:0; width:100%; height:100%;
  object-fit:cover; object-position:center top;
  pointer-events:none;
}

/* ELEMENTS on canvas */
.canvas-el {
  position:absolute;
  cursor:move;
  user-select:none;
  touch-action:none;
  transition: box-shadow .1s;
}
.canvas-el.selected {
  box-shadow: 0 0 0 2px rgba(255,255,255,0.9), 0 0 0 4px rgba(0,0,0,0.5);
  border-radius: inherit;
  z-index:999 !important;
}
.canvas-el-inner {
  width:100%; height:100%;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; border-radius:inherit;
  white-space:pre-wrap; word-break:break-word; text-align:center;
  line-height:1.3; padding:10px 12px;
}

/* Resize handle */
.resize-handle {
  position:absolute; bottom:-5px; right:-5px;
  width:14px; height:14px; background:#fff; border-radius:3px;
  cursor:se-resize; border:2px solid #111;
  display:none;
}
.canvas-el.selected .resize-handle { display:block; }

/* ── RIGHT PANEL ── */
.panel-right {
  width:220px; min-width:220px;
  background:var(--surface);
  border-left:1px solid var(--border);
  display:flex; flex-direction:column;
  overflow:hidden;
}
.panel-right-header {
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  font-size:10px; font-weight:700; letter-spacing:1px;
  text-transform:uppercase; color:var(--text3);
}
.panel-right-body { flex:1; overflow-y:auto; padding:12px; display:flex; flex-direction:column; gap:8px; }
.panel-right-body::-webkit-scrollbar { width:3px; }
.panel-right-body::-webkit-scrollbar-thumb { background:#333; }

/* LAYER item */
.layer-item {
  background:var(--surface2); border:1px solid var(--border);
  border-radius:5px; padding:7px 9px;
  display:flex; align-items:center; gap:7px;
  cursor:pointer; transition:all .15s; font-size:11px;
}
.layer-item:hover { border-color:#444; }
.layer-item.selected { border-color:rgba(255,255,255,0.35); }
.layer-icon { font-size:12px; flex-shrink:0; }
.layer-name { flex:1; color:var(--text2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.layer-vis { font-size:11px; cursor:pointer; color:var(--text3); }

/* Export button */
.btn-export {
  margin:12px; background:#fff; color:#111; border:none; border-radius:8px;
  padding:11px; font-family:'Inter',sans-serif; font-weight:700; font-size:12px;
  cursor:pointer; transition:background .15s; letter-spacing:0.2px;
}
.btn-export:hover { background:#e8e8e8; }

/* Toolbar top */
.toolbar {
  position:absolute; top:12px; left:50%; transform:translateX(-50%);
  background:rgba(20,20,20,0.9); border:1px solid rgba(255,255,255,0.08);
  border-radius:10px; padding:6px 10px;
  display:flex; align-items:center; gap:8px;
  backdrop-filter:blur(10px); z-index:1000; pointer-events:none;
}
.toolbar-hint { font-size:10px; color:rgba(255,255,255,0.3); pointer-events:none; }
</style>
</head>
<body>
<div class="app">

  <!-- ══ LEFT PANEL ══ -->
  <div class="panel-left">
    <div class="panel-logo">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
        <rect width="24" height="24" rx="6" fill="url(#ig)"/>
        <defs><linearGradient id="ig" x1="0" y1="24" x2="24" y2="0"><stop offset="0%" stop-color="#f09433"/><stop offset="25%" stop-color="#e6683c"/><stop offset="50%" stop-color="#dc2743"/><stop offset="75%" stop-color="#cc2366"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs>
        <rect x="6" y="6" width="12" height="12" rx="3" stroke="#fff" stroke-width="1.5" fill="none"/>
        <circle cx="12" cy="12" r="3" stroke="#fff" stroke-width="1.5" fill="none"/>
        <circle cx="16.5" cy="7.5" r="1" fill="#fff"/>
      </svg>
      <div>
        <div class="panel-logo-text">Story Editor</div>
        <div class="panel-logo-sub">9:16 · 1080×1920</div>
      </div>
    </div>

    <div class="panel-tabs">
      <div class="ptab active" data-tab="elements" onclick="switchTab('elements',this)">Elementos</div>
      <div class="ptab" data-tab="props" onclick="switchTab('props',this)">Propriedades</div>
      <div class="ptab" data-tab="bg" onclick="switchTab('bg',this)">Fundo</div>
    </div>

    <!-- TAB: ELEMENTS -->
    <div class="panel-body" id="tab-elements">
      <div>
        <div class="section-label">Foto de fundo</div>
        <label class="upload-zone" for="fileInput" id="uploadLabel">
          <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24" opacity=".4">
            <path d="M3 16.5v2.25A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75V16.5m-13.5-9L12 3m0 0 4.5 4.5M12 3v13.5"/>
          </svg>
          <strong id="uploadText">Enviar foto</strong>
          <span>clique para selecionar</span>
        </label>
        <input type="file" id="fileInput" accept="image/*" onchange="loadPhoto(this)">
      </div>

      <div>
        <div class="section-label">Elementos de texto</div>
        <div class="el-list" id="elList"></div>
        <div style="height:6px"></div>
        <button class="btn-add-el" onclick="addElement('text')">+ Adicionar texto</button>
        <div style="height:4px"></div>
        <button class="btn-add-el" onclick="addElement('box')">+ Adicionar caixa</button>
      </div>
    </div>

    <!-- TAB: PROPERTIES -->
    <div class="panel-body" id="tab-props" style="display:none">
      <div id="propsPanel">
        <div class="prop-empty">Selecione um elemento no canvas para editar suas propriedades</div>
      </div>
    </div>

    <!-- TAB: BG -->
    <div class="panel-body" id="tab-bg" style="display:none">
      <div>
        <div class="section-label">Cor de fundo</div>
        <div class="bg-swatch-row">
          <div class="bg-swatch" style="background:#000" onclick="setBgColor('#000')"></div>
          <div class="bg-swatch" style="background:#fff" onclick="setBgColor('#fff')"></div>
          <div class="bg-swatch" style="background:#1a1a2e" onclick="setBgColor('#1a1a2e')"></div>
          <div class="bg-swatch" style="background:#2e2e80" onclick="setBgColor('#2e2e80')"></div>
          <div class="bg-swatch" style="background:#c0bfbf" onclick="setBgColor('#c0bfbf')"></div>
          <div class="bg-swatch" style="background:#c8c8c8" onclick="setBgColor('#c8c8c8')"></div>
          <div class="bg-swatch" style="background:#3cb043" onclick="setBgColor('#3cb043')"></div>
          <div class="bg-swatch" style="background:#d4aa6e" onclick="setBgColor('#d4aa6e')"></div>
        </div>
        <div style="height:8px"></div>
        <div class="color-row">
          <div class="color-preview" style="background:#111" id="bgColorPreview">
            <input type="color" class="color-input-hidden" id="bgColorPicker" value="#111111" oninput="setBgColor(this.value)">
          </div>
          <span style="font-size:11px;color:var(--text3)">Cor personalizada</span>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="section-label">Overlay sobre a foto</div>
        <div class="prop-row">
          <label>Cor</label>
          <div class="color-row">
            <div class="color-preview" id="overlayColorPreview" style="background:rgba(0,0,0,0.4)">
              <input type="color" class="color-input-hidden" id="overlayColorPicker" value="#000000" oninput="setOverlayColor(this.value)">
            </div>
          </div>
        </div>
        <div style="height:6px"></div>
        <div class="prop-row">
          <label>Opacidade</label>
          <div class="range-with-val" style="flex:1">
            <input type="range" class="input-range" id="overlayOpacity" min="0" max="90" value="0" oninput="setOverlayOpacity(this.value); document.getElementById('overlayOpVal').textContent=this.value+'%'">
            <span class="range-val" id="overlayOpVal">0%</span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ CANVAS ══ -->
  <div class="canvas-area" id="canvasArea" onclick="handleCanvasClick(event)">
    <div class="toolbar">
      <span class="toolbar-hint">clique · arraste · redimensione</span>
    </div>
    <div id="storyFrame">
      <div id="overlayDiv" style="position:absolute;inset:0;pointer-events:none;background:rgba(0,0,0,0);z-index:1;"></div>
      <img id="storyBg" src="" style="display:none; position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;z-index:0;">
    </div>
  </div>

  <!-- ══ RIGHT PANEL ══ -->
  <div class="panel-right">
    <div class="panel-right-header">Camadas</div>
    <div class="panel-right-body" id="layerList"></div>
    <button class="btn-export" onclick="exportStory()">⬇ Exportar PNG</button>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>

// ── STATE ──
let elements = [];
let selectedId = null;
let elCounter = 0;
let overlayColor = '#000000';
let overlayOpacity = 0;

const FONTS = [
  { label: 'Modern',         value: 'Raleway',            weight: '300', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Classic',        value: 'Oswald',             weight: '700', style: 'normal', transform: 'uppercase', effect: ''    },
  { label: 'Neon',           value: 'Bebas Neue',         weight: '400', style: 'normal', transform: 'uppercase', effect: 'neon'},
  { label: 'Typewriter',     value: 'Special Elite',      weight: '400', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Strong',         value: 'Playfair Display',   weight: '700', style: 'italic', transform: 'none',      effect: ''    },
  { label: 'Comic Sans',     value: 'Bangers',            weight: '400', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Italic Serif',   value: 'Cormorant Garamond', weight: '400', style: 'italic', transform: 'none',      effect: ''    },
  { label: 'Simple',         value: 'DM Sans',            weight: '400', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Instagram Sans', value: 'Poppins',            weight: '400', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Poster',         value: 'Anton',              weight: '400', style: 'normal', transform: 'uppercase', effect: ''    },
  { label: 'Bubble',         value: 'Fredoka',            weight: '700', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Deco',           value: 'Cinzel',             weight: '400', style: 'normal', transform: 'none',      effect: ''    },
  { label: 'Signature',      value: 'Dancing Script',     weight: '400', style: 'normal', transform: 'none',      effect: ''    },
];

// ── ELEMENT DEFAULTS ──
function makeElement(type) {
  elCounter++;
  const id = 'el_' + elCounter;
  const frame = document.getElementById('storyFrame');
  const fr = frame.getBoundingClientRect();

  const defaults = {
    text: {
      id, type:'text',
      text: 'Toque no texto para editar',
      x: 20, y: Math.round(fr.height * 0.4),
      w: 320, h: 60,
      fontSize: 18,
      fontFamily: 'Poppins',
      fontWeight: '600',
      fontStyle: 'normal',
      fontEffect: '',
      textTransform: 'none',
      textAlign: 'center',
      color: '#ffffff',
      bgColor: 'transparent',
      bgOpacity: 0,
      radius: 0,
      padX: 12, padY: 8,
      visible: true,
      zIndex: elCounter + 10,
    },
    box: {
      id, type:'box',
      text: 'Texto da caixa',
      x: 20, y: Math.round(fr.height * 0.5),
      w: 320, h: 70,
      fontSize: 14,
      fontFamily: 'Poppins',
      fontWeight: '400',
      fontStyle: 'normal',
      fontEffect: '',
      textTransform: 'none',
      textAlign: 'center',
      color: '#ffffff',
      bgColor: '#2e2e80',
      bgOpacity: 100,
      radius: 6,
      padX: 16, padY: 12,
      visible: true,
      zIndex: elCounter + 10,
    },
  };
  return defaults[type];
}

// ── ADD / DELETE ──
function addElement(type) {
  const el = makeElement(type);
  elements.push(el);
  renderElement(el);
  selectElement(el.id);
  renderLayerList();
  renderElList();
}

function deleteElement(id) {
  elements = elements.filter(e => e.id !== id);
  const dom = document.getElementById(id);
  if (dom) dom.remove();
  if (selectedId === id) { selectedId = null; renderPropsPanel(); }
  renderLayerList();
  renderElList();
}

// ── RENDER ELEMENT ──
function renderElement(el) {
  const frame = document.getElementById('storyFrame');
  let dom = document.getElementById(el.id);

  if (!dom) {
    dom = document.createElement('div');
    dom.id = el.id;
    dom.className = 'canvas-el';
    dom.innerHTML = `<div class="canvas-el-inner" id="${el.id}_inner"></div><div class="resize-handle" id="${el.id}_rh"></div>`;
    frame.appendChild(dom);
    attachDrag(dom, el);
    attachResize(document.getElementById(el.id + '_rh'), el);
    dom.addEventListener('click', (e) => { e.stopPropagation(); selectElement(el.id); });
    // Double click to edit text
    dom.addEventListener('dblclick', (e) => { e.stopPropagation(); startInlineEdit(el); });
  }

  // Apply styles
  dom.style.cssText = `
    left:${el.x}px; top:${el.y}px;
    width:${el.w}px; height:${el.h}px;
    z-index:${el.zIndex};
    display:${el.visible ? 'flex' : 'none'};
    border-radius:${el.radius}px;
  `;

  const inner = document.getElementById(el.id + '_inner');
  const bgRgba = el.bgColor !== 'transparent'
    ? hexToRgba(el.bgColor, el.bgOpacity / 100)
    : 'transparent';

  const neonShadow = el.fontEffect === 'neon'
    ? `text-shadow: 0 0 6px ${el.color}, 0 0 14px ${el.color}, 0 0 30px ${el.color}, 0 0 60px ${el.color};`
    : 'text-shadow: none;';

  inner.style.cssText = `
    background: ${bgRgba};
    color: ${el.color};
    font-family: '${el.fontFamily}', sans-serif;
    font-size: ${el.fontSize}px;
    font-weight: ${el.fontWeight};
    font-style: ${el.fontStyle};
    text-transform: ${el.textTransform};
    text-align: ${el.textAlign};
    padding: ${el.padY}px ${el.padX}px;
    border-radius: ${el.radius}px;
    line-height: 1.25;
    white-space: pre-wrap;
    word-break: break-word;
    width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: ${el.textAlign === 'left' ? 'flex-start' : el.textAlign === 'right' ? 'flex-end' : 'center'};
    overflow: hidden;
    ${neonShadow}
  `;
  inner.textContent = el.text;
}

function applySelected() {
  const el = getEl(selectedId);
  if (!el) return;
  const dom = document.getElementById(el.id);
  if (!dom) return;
  // toggle selected class on all
  document.querySelectorAll('.canvas-el').forEach(d => d.classList.remove('selected'));
  dom.classList.add('selected');
}

// ── DRAG ──
function attachDrag(dom, el) {
  let dragging = false, ox=0, oy=0, startX=0, startY=0;
  dom.addEventListener('mousedown', (e) => {
    if (e.target.classList.contains('resize-handle')) return;
    dragging = true;
    ox = el.x; oy = el.y;
    startX = e.clientX; startY = e.clientY;
    e.preventDefault();
  });
  window.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const frame = document.getElementById('storyFrame');
    const dx = e.clientX - startX;
    const dy = e.clientY - startY;
    el.x = Math.max(0, Math.min(frame.offsetWidth - el.w, ox + dx));
    el.y = Math.max(0, Math.min(frame.offsetHeight - el.h, oy + dy));
    dom.style.left = el.x + 'px';
    dom.style.top = el.y + 'px';
    if (selectedId === el.id) updatePosInPanel();
  });
  window.addEventListener('mouseup', () => { dragging = false; });
}

// ── RESIZE ──
function attachResize(handle, el) {
  let resizing = false, startX=0, startY=0, startW=0, startH=0;
  handle.addEventListener('mousedown', (e) => {
    resizing = true;
    startX = e.clientX; startY = e.clientY;
    startW = el.w; startH = el.h;
    e.preventDefault(); e.stopPropagation();
  });
  window.addEventListener('mousemove', (e) => {
    if (!resizing) return;
    el.w = Math.max(60, startW + (e.clientX - startX));
    el.h = Math.max(30, startH + (e.clientY - startY));
    const dom = document.getElementById(el.id);
    dom.style.width = el.w + 'px';
    dom.style.height = el.h + 'px';
    if (selectedId === el.id) updateSizeInPanel();
  });
  window.addEventListener('mouseup', () => { resizing = false; });
}

// ── INLINE EDIT ──
function startInlineEdit(el) {
  const inner = document.getElementById(el.id + '_inner');
  inner.contentEditable = 'true';
  inner.focus();
  // select all
  const range = document.createRange();
  range.selectNodeContents(inner);
  window.getSelection().removeAllRanges();
  window.getSelection().addRange(range);

  function finish() {
    inner.contentEditable = 'false';
    el.text = inner.textContent;
    inner.removeEventListener('blur', finish);
    inner.removeEventListener('keydown', onKey);
    renderElement(el);
    renderElList();
    renderPropsPanel();
  }
  function onKey(e) { if (e.key === 'Escape') finish(); }
  inner.addEventListener('blur', finish);
  inner.addEventListener('keydown', onKey);
}

// ── SELECT ──
function selectElement(id) {
  selectedId = id;
  document.querySelectorAll('.canvas-el').forEach(d => d.classList.remove('selected'));
  const dom = document.getElementById(id);
  if (dom) dom.classList.add('selected');
  renderPropsPanel();
  renderLayerList();
  // auto-switch to props tab
  const propsTab = document.querySelector('[data-tab="props"]');
  if (propsTab) switchTab('props', propsTab);
}

function handleCanvasClick(e) {
  if (e.target.id === 'storyFrame' || e.target.id === 'storyBg' || e.target.id === 'overlayDiv' || e.target.id === 'canvasArea') {
    selectedId = null;
    document.querySelectorAll('.canvas-el').forEach(d => d.classList.remove('selected'));
    renderPropsPanel();
    renderLayerList();
  }
}

function getEl(id) { return elements.find(e => e.id === id); }

function bindPropListeners(el) {
  function on(id, fn) {
    const dom = document.getElementById(id);
    if (!dom) return;
    dom.addEventListener('input', fn);
    dom.addEventListener('change', fn);
  }

  on('p_text', e => { el.text = e.target.value; renderElement(el); renderElList(); });
  on('p_font', e => {
    const def = FONTS.find(f => f.value === e.target.value);
    el.fontFamily = e.target.value;
    if (def) {
      el.fontWeight    = def.weight;
      el.fontStyle     = def.style;
      el.textTransform = def.transform;
      el.fontEffect    = def.effect;
      // sync weight/style/transform selects
      const pw = document.getElementById('p_weight');
      const ps = document.getElementById('p_style');
      const pt = document.getElementById('p_transform');
      if (pw) pw.value = def.weight;
      if (ps) ps.value = def.style;
      if (pt) pt.value = def.transform;
    }
    renderElement(el);
  });
  on('p_size', e => { el.fontSize = +e.target.value; renderElement(el); });
  on('p_weight', e => { el.fontWeight = e.target.value; renderElement(el); });
  on('p_style', e => { el.fontStyle = e.target.value; renderElement(el); });
  on('p_transform', e => { el.textTransform = e.target.value; renderElement(el); });
  on('p_align', e => { el.textAlign = e.target.value; renderElement(el); });
  on('p_color', e => {
    el.color = e.target.value;
    document.getElementById('textColorPreview').style.background = e.target.value;
    renderElement(el);
  });
  on('p_bgColor', e => {
    el.bgColor = e.target.value;
    document.getElementById('bgColorPreviewEl').style.background = e.target.value;
    renderElement(el);
  });
  on('p_bgOp', e => {
    el.bgOpacity = +e.target.value;
    document.getElementById('p_bgOpVal').textContent = e.target.value + '%';
    renderElement(el);
  });
  on('p_radius', e => {
    el.radius = +e.target.value;
    document.getElementById('p_radiusVal').textContent = e.target.value + 'px';
    renderElement(el);
  });
  on('p_padX', e => { el.padX = +e.target.value; renderElement(el); });
  on('p_padY', e => { el.padY = +e.target.value; renderElement(el); });
  on('p_x', e => { el.x = +e.target.value; const d = document.getElementById(el.id); if(d) d.style.left = el.x + 'px'; });
  on('p_y', e => { el.y = +e.target.value; const d = document.getElementById(el.id); if(d) d.style.top = el.y + 'px'; });
  on('p_w', e => { el.w = +e.target.value; const d = document.getElementById(el.id); if(d) d.style.width = el.w + 'px'; });
  on('p_h', e => { el.h = +e.target.value; const d = document.getElementById(el.id); if(d) d.style.height = el.h + 'px'; });
}

function updatePosInPanel() {
  const el = getEl(selectedId);
  if (!el) return;
  const px = document.getElementById('p_x');
  const py = document.getElementById('p_y');
  if (px) px.value = Math.round(el.x);
  if (py) py.value = Math.round(el.y);
}
function updateSizeInPanel() {
  const el = getEl(selectedId);
  if (!el) return;
  const pw = document.getElementById('p_w');
  const ph = document.getElementById('p_h');
  if (pw) pw.value = Math.round(el.w);
  if (ph) ph.value = Math.round(el.h);
}

// ── SNAP ──
function snapEl(dir) {
  const el = getEl(selectedId);
  if (!el) return;
  const frame = document.getElementById('storyFrame');
  const fw = frame.offsetWidth;
  const fh = frame.offsetHeight;
  if (dir === 'left') el.x = 0;
  if (dir === 'center') el.x = (fw - el.w) / 2;
  if (dir === 'right') el.x = fw - el.w;
  if (dir === 'top') el.y = 0;
  if (dir === 'vcenter') el.y = (fh - el.h) / 2;
  if (dir === 'bottom') el.y = fh - el.h;
  renderElement(el);
  renderPropsPanel();
}

// ── LAYER LIST ──
function renderLayerList() {
  const list = document.getElementById('layerList');
  if (!elements.length) {
    list.innerHTML = '<div style="font-size:11px;color:var(--text3);text-align:center;padding:20px 8px">Nenhum elemento ainda</div>';
    return;
  }
  list.innerHTML = [...elements].reverse().map(el => `
    <div class="layer-item ${selectedId===el.id?'selected':''}" onclick="selectElement('${el.id}')">
      <span class="layer-icon">${el.type === 'text' ? 'T' : '▬'}</span>
      <span class="layer-name">${el.text.slice(0,22)}</span>
      <span class="layer-vis" onclick="toggleVis('${el.id}',event)">${el.visible?'👁':'○'}</span>
    </div>
  `).join('');
}

function toggleVis(id, e) {
  e.stopPropagation();
  const el = getEl(id);
  if (!el) return;
  el.visible = !el.visible;
  renderElement(el);
  renderLayerList();
}

// ── ELEMENT LIST (left panel) ──
function renderElList() {
  const list = document.getElementById('elList');
  if (!elements.length) {
    list.innerHTML = '';
    return;
  }
  list.innerHTML = elements.map(el => `
    <div class="el-item ${selectedId===el.id?'selected':''}" onclick="selectElement('${el.id}')">
      <span class="el-item-icon">${el.type==='text'?'T':'▬'}</span>
      <div class="el-item-info">
        <div class="el-item-name">${el.text.slice(0,24)}</div>
        <div class="el-item-sub">${el.fontFamily} ${el.fontSize}px</div>
      </div>
      <span class="el-item-del" onclick="event.stopPropagation();deleteElement('${el.id}')">✕</span>
    </div>
  `).join('');
}

// ── PHOTO LOAD ──
function loadPhoto(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    const img = document.getElementById('storyBg');
    img.src = e.target.result;
    img.style.display = 'block';
    document.getElementById('uploadText').textContent = '✅ ' + file.name;
  };
  reader.readAsDataURL(file);
}

// ── BACKGROUND ──
function setBgColor(hex) {
  document.getElementById('storyFrame').style.background = hex;
  document.getElementById('bgColorPreview').style.background = hex;
  document.getElementById('bgColorPicker').value = hex.startsWith('#') ? hex : '#000000';
  document.querySelectorAll('.bg-swatch').forEach(s => s.classList.remove('active'));
}

function setOverlayColor(hex) {
  overlayColor = hex;
  updateOverlay();
  document.getElementById('overlayColorPreview').style.background = hexToRgba(hex, overlayOpacity/100);
}

function setOverlayOpacity(val) {
  overlayOpacity = +val;
  updateOverlay();
}

function updateOverlay() {
  document.getElementById('overlayDiv').style.background = hexToRgba(overlayColor, overlayOpacity/100);
}

// ── TABS ──
function switchTab(name, el) {
  document.querySelectorAll('.panel-body').forEach(t => t.style.display = 'none');
  document.querySelectorAll('.ptab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + name).style.display = 'flex';
  el.classList.add('active');
}

// ── EXPORT ──
async function exportStory() {
  // Deselect everything
  const prev = selectedId;
  selectedId = null;
  document.querySelectorAll('.canvas-el').forEach(d => d.classList.remove('selected'));

  const frame = document.getElementById('storyFrame');
  const canvas = await html2canvas(frame, {
    scale: 3,
    useCORS: true,
    allowTaint: true,
    backgroundColor: null,
    logging: false,
    width: 360,
    height: 640,
  });

  const a = document.createElement('a');
  a.download = 'story.png';
  a.href = canvas.toDataURL('image/png');
  a.click();

  // Restore selection
  if (prev) selectElement(prev);
}

// ── UTILS ──
function hexToRgba(hex, alpha) {
  if (!hex || hex === 'transparent') return 'transparent';
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── KEYBOARD ──
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    selectedId = null;
    document.querySelectorAll('.canvas-el').forEach(d => d.classList.remove('selected'));
    renderPropsPanel();
    renderLayerList();
  }
  if ((e.key === 'Delete' || e.key === 'Backspace') && selectedId) {
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA' || active.isContentEditable)) return;
    deleteElement(selectedId);
  }
  // Arrow nudge
  const el = getEl(selectedId);
  if (el && ['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
    const active = document.activeElement;
    if (active && (active.tagName === 'INPUT' || active.tagName === 'TEXTAREA')) return;
    const step = e.shiftKey ? 10 : 1;
    if (e.key === 'ArrowLeft') el.x -= step;
    if (e.key === 'ArrowRight') el.x += step;
    if (e.key === 'ArrowUp') el.y -= step;
    if (e.key === 'ArrowDown') el.y += step;
    const dom = document.getElementById(el.id);
    if (dom) { dom.style.left = el.x + 'px'; dom.style.top = el.y + 'px'; }
    updatePosInPanel();
    e.preventDefault();
  }
});
